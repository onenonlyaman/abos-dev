services:
  postgres:
    image: postgres:16-alpine
    container_name: abos_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: abos
      POSTGRES_PASSWORD: abos_dev_password
      POSTGRES_DB: abos
    ports:
      - "55432:5432"
    volumes:
      - abos_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U abos -d abos"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: abos_redis
    restart: unless-stopped
    ports:
      - "56379:6379"
    volumes:
      - abos_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    container_name: abos_api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: "postgresql://abos:abos_dev_password@postgres:5432/abos?schema=public"
      REDIS_HOST: "redis"
      REDIS_PORT: 6379
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    container_name: abos_web
    restart: unless-stopped
    ports:
      - "3010:3010"
    environment:
      NEXT_PUBLIC_API_URL: "http://4.240.114.221:3001"
      PORT: 3010
    depends_on:
      - api

volumes:
  abos_postgres_data:
  abos_redis_data:
